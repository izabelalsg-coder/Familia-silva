<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Família Silva</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f7f3ee;
      --card:     #ffffff;
      --border:   #e8e0d5;
      --text:     #2d2417;
      --muted:    #8a7968;
      --accent:   #c0834e;
      --radius:   16px;
      --shadow:   0 2px 12px rgba(0,0,0,.08);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    #root {
      display: flex;
      justify-content: center;
    }

    .app-shell {
      width: 100%;
      max-width: 480px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      position: relative;
    }

    /* ── HEADER ── */
    .header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title { font-size: 18px; font-weight: 700; color: var(--accent); }
    .header-member {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .member-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      border: 2px solid transparent;
    }
    .header-logout {
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: none;
    }

    /* ── SCROLL AREA ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 80px;
      -webkit-overflow-scrolling: touch;
    }

    /* ── BOTTOM NAV ── */
    .nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 20;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 4px 8px;
      font-size: 11px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      gap: 3px;
      transition: color .15s;
    }
    .nav-btn.active { color: var(--accent); font-weight: 700; }
    .nav-btn span:first-child { font-size: 22px; }

    /* ── LOGIN SCREEN ── */
    .login-bg {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      background: linear-gradient(160deg, #fdf6ed 0%, #f0e4d4 100%);
    }
    .login-logo { font-size: 56px; margin-bottom: 12px; }
    .login-title { font-size: 26px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
    .login-sub { font-size: 14px; color: var(--muted); margin-bottom: 36px; }
    .member-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      width: 100%;
      max-width: 360px;
    }
    .member-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform .15s, box-shadow .15s;
      box-shadow: var(--shadow);
    }
    .member-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.12); }
    .member-card .emoji { font-size: 42px; margin-bottom: 10px; }
    .member-card .name { font-size: 15px; font-weight: 700; color: white; }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin: 16px 16px 0;
    }
    .card-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ── DEVOCIONAL ── */
    .dev-date { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .dev-titulo { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 12px; line-height: 1.3; }
    .dev-verse-box {
      background: linear-gradient(135deg, #fdf0e0 0%, #fde8ca 100%);
      border-left: 4px solid var(--accent);
      padding: 14px 16px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 14px;
      font-style: italic;
      line-height: 1.6;
      color: #5c3d1e;
    }
    .dev-reflexao { font-size: 15px; line-height: 1.7; color: #3d3020; margin-bottom: 16px; }
    .dev-oracao-box {
      background: #f0f7ff;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.6;
      color: #1e3a5c;
    }
    .dev-oracao-label { font-weight: 700; color: #2563a8; font-size: 12px; margin-bottom: 6px; }

    /* ── COMMENTS ── */
    .comments-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .comment-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .comment-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .comment-bubble {
      background: var(--bg);
      border-radius: 12px;
      padding: 10px 14px;
      flex: 1;
    }
    .comment-author { font-size: 12px; font-weight: 700; margin-bottom: 3px; }
    .comment-text { font-size: 13px; color: var(--text); line-height: 1.5; }
    .comment-time { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .comment-form { display: flex; gap: 8px; }
    .comment-input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 24px;
      border: 1.5px solid var(--border);
      background: var(--card);
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .comment-input:focus { border-color: var(--accent); }
    .btn {
      padding: 10px 18px;
      border-radius: 24px;
      border: none;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-sm { padding: 7px 14px; font-size: 13px; }
    .btn-ghost { background: var(--border); color: var(--text); }

    /* ── PRAYERS ── */
    .prayer-card {
      background: var(--bg);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      border-left: 4px solid #999;
    }
    .prayer-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .prayer-member { font-size: 12px; font-weight: 700; }
    .prayer-text { font-size: 14px; line-height: 1.6; color: var(--text); }
    .prayer-time { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .prayer-form { display: flex; flex-direction: column; gap: 8px; }
    .prayer-textarea {
      padding: 12px 14px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 80px;
      outline: none;
      line-height: 1.6;
    }
    .prayer-textarea:focus { border-color: var(--accent); }
    .week-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      background: #fff0e0;
      color: var(--accent);
      border-radius: 20px;
      padding: 3px 10px;
      margin-bottom: 12px;
    }

    /* ── MISSIONS ── */
    .mission-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .mission-item:last-child { border-bottom: none; }
    .mission-check {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 14px;
      transition: background .15s, border-color .15s;
    }
    .mission-check.done { border-color: #22c55e; background: #22c55e; }
    .mission-text { font-size: 15px; color: var(--text); line-height: 1.4; }
    .mission-text.done { text-decoration: line-through; color: var(--muted); }
    .mission-id { font-size: 10px; color: var(--muted); margin-top: 2px; font-family: monospace; }
    .missions-completors {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .completor-dot {
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
    }

    /* ── PROGRESS ── */
    .progress-member-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin: 0 0 12px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .progress-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }
    .progress-info { flex: 1; }
    .progress-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .progress-phase {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--accent);
    }
    .progress-bar-track {
      height: 8px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .4s ease;
    }
    .progress-count { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .phase-legend {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px 20px;
      margin-bottom: 12px;
    }
    .phase-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .phase-row:last-child { border-bottom: none; }
    .phase-icon { font-size: 22px; width: 32px; text-align: center; }
    .phase-name { font-size: 14px; font-weight: 600; }
    .phase-range { font-size: 12px; color: var(--muted); }

    /* ── LOADING ── */
    .loading-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1s infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: .15s; }
    .loading-dot:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }
    .loading-row { display: flex; gap: 6px; justify-content: center; padding: 32px; }

    .empty-state { text-align: center; padding: 32px 20px; color: var(--muted); font-size: 14px; }
    .empty-icon { font-size: 40px; margin-bottom: 10px; }

    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: white;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 13px;
      z-index: 100;
      white-space: nowrap;
      animation: fadeInOut 2.5s ease forwards;
    }
    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
      15% { opacity: 1; transform: translateX(-50%) translateY(0); }
      75% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>

<script type="text/babel">

/* ============================================================

const APP_NAME = 'Família Silva';

const MEMBERS = [

  { id: 'mae',    name: 'Mãe',    emoji: '👩', color: '#EC4899' },

  { name: 'Semente',  emoji: '🌱', min: 0,   max: 4,   color: '#a3d977' },
  { name: 'Broto',    emoji: '🌿', min: 5,   max: 14,  color: '#4ade80' },

  { name: 'Floresta', emoji: '✨', min: 50,  max: 9999, color: '#f59e0b' },
];

const DEFAULT_MISSIONS = [
  'Ler a passagem bíblica do dia',
  'Orar em família',
  'Compartilhar uma palavra de encorajamento com alguém',
  'Praticar um ato de bondade',
  'Agradecer a Deus por 3 bênçãos específicas',
];

/* ============================================================
   SUPABASE
   ============================================================ */
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ============================================================
   HELPERS
   ============================================================ */
function getTodayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function getWeekKey(date = new Date()) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2, '0')}`;
}

function formatDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

function getMemberById(id) {
  return MEMBERS.find(m => m.id === id) || { name: id, emoji: '👤', color: '#999' };
}

function getPhase(count) {
  return PHASES.slice().reverse().find(p => count >= p.min) || PHASES[0];
}

function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

/* ============================================================
   TOAST
   ============================================================ */
function Toast({ msg }) {
  if (!msg) return null;
  return <div className="toast">{msg}</div>;
}

function useToast() {
  const [msg, setMsg] = React.useState('');
  const show = (m) => {
    setMsg(m);
    setTimeout(() => setMsg(''), 2600);
  };
  return [msg, show];
}

/* ============================================================
   LOADING
   ============================================================ */
function Loading() {
  return (
    <div className="loading-row">
      <span className="loading-dot" />
      <span className="loading-dot" />
      <span className="loading-dot" />
    </div>
  );
}

/* ============================================================
   LOGIN SCREEN
   ============================================================ */
function LoginScreen({ onSelect }) {
  return (
    <div className="login-bg">
      <div className="login-logo">✝️</div>
      <h1 className="login-title">{APP_NAME}</h1>
      <p className="login-sub">Quem está acessando?</p>
      <div className="member-grid">
        {MEMBERS.map(m => (
          <div
            key={m.id}
            className="member-card"
            style={{ background: `linear-gradient(135deg, ${m.color} 0%, ${hexAlpha(m.color, 0.7)} 100%)` }}
            onClick={() => onSelect(m)}
          >
            <span className="emoji">{m.emoji}</span>
            <span className="name">{m.name}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ============================================================
   HEADER
   ============================================================ */
function Header({ member, onLogout }) {
  return (
    <div className="header">
      <span className="header-title">✝️ {APP_NAME}</span>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <div
          className="member-avatar"
          style={{ background: hexAlpha(member.color, 0.15), borderColor: member.color }}
        >
          {member.emoji}
        </div>
        <button className="header-logout" onClick={onLogout}>Trocar</button>
      </div>
    </div>

}

/* ============================================================
   BOTTOM NAV
   ============================================================ */
function NavBar({ active, onChange, memberColor }) {
  const tabs = [
    { id: 'devocional', icon: '📖', label: 'Devocional' },
    { id: 'oracoes',    icon: '🙏', label: 'Orações'    },
    { id: 'missoes',    icon: '⚔️',  label: 'Missões'   },
    { id: 'progresso',  icon: '🏆', label: 'Progresso'  },
  ];
  return (
    <div className="nav">
      {tabs.map(t => (
        <button
          key={t.id}
          className={`nav-btn ${active === t.id ? 'active' : ''}`}
          style={active === t.id ? { color: memberColor } : {}}
          onClick={() => onChange(t.id)}
        >
          <span>{t.icon}</span>
          <span>{t.label}</span>
        </button>
      ))}
    </div>
  );
}

/* ============================================================
   DEVOCIONAL TAB
   ============================================================ */
function DevocionalTab({ devotional, member, today }) {
  const [comments, setComments] = React.useState([]);
  const [text, setText] = React.useState('');
  const [loading, setLoading] = React.useState(true);
  const [sending, setSending] = React.useState(false);
  const [toast, showToast] = useToast();

  React.useEffect(() => {
    loadComments();
  }, [today]);

  async function loadComments() {
    setLoading(true);
    const { data } = await supabase
      .from('daily_comments')
      .select('*')
      .eq('devotional_date', today)
      .order('created_at', { ascending: true });
    setComments(data || []);
    setLoading(false);
  }

  async function addComment() {
    if (!text.trim()) return;
    setSending(true);
    await supabase.from('daily_comments').insert({
      member_id: member.id,
      devotional_date: today,
      comment: text.trim(),
    });
    setText('');
    await loadComments();
    setSending(false);
    showToast('Comentário enviado!');
  }

  if (!devotional) return <Loading />;

  const m = getMemberById(member.id);

  return (
    <div>
      <div className="card">
        <p className="dev-date">{formatDate(today)}</p>
        <h2 className="dev-titulo">{devotional.titulo}</h2>
        <div className="dev-verse-box">{devotional.versiculo}</div>
        <p className="dev-reflexao">{devotional.reflexao}</p>
        <div className="dev-oracao-box">
          <p className="dev-oracao-label">🙏 ORAÇÃO DO DIA</p>
          <p>{devotional.oracao}</p>
        </div>
      </div>

      <div className="card" style={{ marginTop: 12 }}>
        <p className="card-title">💬 Comentários de hoje</p>

        {loading ? (
          <Loading />
        ) : comments.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon">💬</div>
            <p>Seja o primeiro a comentar hoje!</p>
          </div>
        ) : (
          <div className="comments-list">
            {comments.map(c => {
              const cm = getMemberById(c.member_id);
              return (
                <div key={c.id} className="comment-item">
                  <div
                    className="comment-avatar"
                    style={{ background: hexAlpha(cm.color, 0.15) }}
                  >
                    {cm.emoji}
                  </div>
                  <div className="comment-bubble">
                    <p className="comment-author" style={{ color: cm.color }}>{cm.name}</p>
                    <p className="comment-text">{c.comment}</p>
                    <p className="comment-time">{formatTime(c.created_at)}</p>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        <div className="comment-form">
          <input
            className="comment-input"
            placeholder="Escreva um comentário..."
            value={text}
            onChange={e => setText(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && addComment()}
          />
          <button
            className="btn btn-primary btn-sm"
            onClick={addComment}
            disabled={sending || !text.trim()}
          >
            {sending ? '...' : 'Enviar'}
          </button>
        </div>
      </div>

      <Toast msg={toast} />
    </div>
  );
}

/* ============================================================
   ORAÇÕES TAB (Prayer Wall)
   ============================================================ */
function OracoesTab({ member }) {
  const weekKey = getWeekKey();
  const [prayers, setPrayers] = React.useState([]);
  const [text, setText] = React.useState('');
  const [loading, setLoading] = React.useState(true);
  const [sending, setSending] = React.useState(false);
  const [toast, showToast] = useToast();

  React.useEffect(() => {
    loadPrayers();
  }, [weekKey]);

  async function loadPrayers() {
    setLoading(true);
    const { data } = await supabase
      .from('prayers')
      .select('*')
      .eq('week_key', weekKey)
      .order('created_at', { ascending: false });
    setPrayers(data || []);
    setLoading(false);
  }

  async function addPrayer() {
    if (!text.trim()) return;
    setSending(true);
    await supabase.from('prayers').insert({
      member_id: member.id,
      text: text.trim(),
      week_key: weekKey,
    });
    setText('');
    await loadPrayers();
    setSending(false);
    showToast('Pedido adicionado!');
  }

  return (
    <div>
      <div className="card">
        <span className="week-badge">📅 Semana {weekKey}</span>
        <p className="card-title">🙏 Mural de Orações</p>
        <p style={{ fontSize: 13, color: 'var(--muted)', marginBottom: 16, lineHeight: 1.6 }}>
          Compartilhe seus pedidos com a família. O mural é renovado a cada semana.
        </p>

        <div className="prayer-form">
          <textarea
            className="prayer-textarea"
            placeholder="Qual é o seu pedido de oração?"
            value={text}
            onChange={e => setText(e.target.value)}
          />
          <button
            className="btn btn-primary"
            onClick={addPrayer}
            disabled={sending || !text.trim()}
          >
            {sending ? 'Enviando...' : '🙏 Adicionar pedido'}
          </button>
        </div>
      </div>

      <div className="card" style={{ marginTop: 12 }}>
        {loading ? (
          <Loading />
        ) : prayers.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon">🙏</div>
            <p>Nenhum pedido esta semana ainda.</p>
          </div>
        ) : (
          prayers.map(p => {
            const pm = getMemberById(p.member_id);
            return (
              <div
                key={p.id}
                className="prayer-card"
                style={{ borderLeftColor: pm.color }}
              >
                <div className="prayer-header">
                  <span style={{ fontSize: 18 }}>{pm.emoji}</span>
                  <span className="prayer-member" style={{ color: pm.color }}>{pm.name}</span>
                </div>
                <p className="prayer-text">{p.text}</p>
                <p className="prayer-time">{formatTime(p.created_at)}</p>
              </div>
            );
          })
        )}
      </div>

      <Toast msg={toast} />
    </div>
  );
}

/* ============================================================
   MISSÕES TAB
   ============================================================ */
function MissoesTab({ member }) {
  const weekKey = getWeekKey();
  const [completions, setCompletions] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [toast, showToast] = useToast();

  React.useEffect(() => {
    loadCompletions();
  }, [weekKey]);

  async function loadCompletions() {
    setLoading(true);
    const { data } = await supabase
      .from('mission_completions')
      .select('*')
      .eq('week_key', weekKey);
    setCompletions(data || []);
    setLoading(false);
  }

  function getMissionId(n) {
    return `${weekKey}-${n}`;
  }

  function isCompleted(n) {
    const id = getMissionId(n);
    return completions.some(c => c.mission_id === id && c.member_id === member.id);
  }

  function getCompletors(n) {
    const id = getMissionId(n);
    return completions
      .filter(c => c.mission_id === id)
      .map(c => getMemberById(c.member_id));
  }

  async function toggleMission(n) {
    const id = getMissionId(n);
    const done = isCompleted(n);
    if (done) {
      await supabase
        .from('mission_completions')
        .delete()
        .eq('mission_id', id)
        .eq('member_id', member.id);
      showToast('Missão desmarcada');
    } else {
      await supabase.from('mission_completions').insert({
        member_id: member.id,
        mission_id: id,
        week_key: weekKey,
      });
      showToast('Missão concluída! 🎉');
    }
    await loadCompletions();
  }

  const myCompleted = DEFAULT_MISSIONS.filter((_, i) => isCompleted(i + 1)).length;

  return (
    <div>
      <div className="card">
        <span className="week-badge">⚔️ Semana {weekKey}</span>
        <p className="card-title">Missões da semana</p>
        <p style={{ fontSize: 13, color: 'var(--muted)', marginBottom: 4 }}>
          {myCompleted}/{DEFAULT_MISSIONS.length} completadas por você
        </p>

        {loading ? (
          <Loading />
        ) : (
          DEFAULT_MISSIONS.map((mission, i) => {
            const n = i + 1;
            const done = isCompleted(n);
            const completors = getCompletors(n);
            return (
              <div key={n} className="mission-item">
                <div
                  className={`mission-check ${done ? 'done' : ''}`}
                  style={done ? {} : { borderColor: member.color }}
                  onClick={() => toggleMission(n)}
                >
                  {done && '✓'}
                </div>
                <div style={{ flex: 1 }}>
                  <p className={`mission-text ${done ? 'done' : ''}`}>{mission}</p>
                  <p className="mission-id">{getMissionId(n)}</p>
                  {completors.length > 0 && (
                    <div className="missions-completors">
                      {completors.map(cm => (
                        <div
                          key={cm.id}
                          className="completor-dot"
                          style={{ background: hexAlpha(cm.color, 0.2), title: cm.name }}
                          title={cm.name}
                        >
                          {cm.emoji}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            );
          })
        )}
      </div>
      <Toast msg={toast} />
    </div>
  );
}

/* ============================================================
   PROGRESSO TAB
   ============================================================ */
function ProgressoTab({ member }) {
  const [counts, setCounts] = React.useState({});
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    loadAllProgress();
  }, []);

  async function loadAllProgress() {
    setLoading(true);
    const { data } = await supabase
      .from('mission_completions')
      .select('member_id');
    const map = {};
    MEMBERS.forEach(m => { map[m.id] = 0; });
    (data || []).forEach(row => {
      if (map[row.member_id] !== undefined) map[row.member_id]++;
    });
    setCounts(map);
    setLoading(false);
  }

  const maxPhase = PHASES[PHASES.length - 1];
  const maxCount = maxPhase.min + 10;

  return (
    <div style={{ padding: 16 }}>
      <p className="card-title" style={{ marginBottom: 14, paddingLeft: 4 }}>Tabuleiro de Progresso</p>

      {loading ? (
        <Loading />
      ) : (
        MEMBERS.map(m => {
          const count = counts[m.id] || 0;
          const phase = getPhase(count);
          const nextPhase = PHASES[PHASES.indexOf(phase) + 1];
          const rangeMax = nextPhase ? nextPhase.min : maxCount;
          const pct = Math.min(100, ((count - phase.min) / (rangeMax - phase.min)) * 100);

          return (
            <div key={m.id} className="progress-member-card">
              <div
                className="progress-avatar"
                style={{ background: hexAlpha(m.color, 0.15), border: `3px solid ${m.color}` }}
              >
                {m.emoji}
              </div>
              <div className="progress-info">
                <p className="progress-name">{m.name}</p>
                <p className="progress-phase">{phase.emoji} {phase.name}</p>
                <div className="progress-bar-track">
                  <div
                    className="progress-bar-fill"
                    style={{ width: `${pct}%`, background: m.color }}
                  />
                </div>
                <p className="progress-count">{count} missões concluídas</p>
              </div>
            </div>
          );
        })
      )}

      <div className="phase-legend">
        <p className="card-title" style={{ marginBottom: 10 }}>Fases</p>
        {PHASES.map(p => (
          <div key={p.name} className="phase-row">
            <span className="phase-icon">{p.emoji}</span>
            <div>
              <p className="phase-name">{p.name}</p>
              <p className="phase-range">
                {p.min === 0 ? '0' : `${p.min}`}
                {p.max === 9999 ? '+' : ` – ${p.max}`} missões
              </p>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ============================================================
   ROOT APP
   ============================================================ */
function App() {
  const [member, setMember] = React.useState(() => {
    try {
      const s = sessionStorage.getItem('familia_silva_member');
      return s ? JSON.parse(s) : null;
    } catch { return null; }
  });
  const [tab, setTab] = React.useState('devocional');
  const [devotional, setDevocional] = React.useState(null);
  const today = getTodayStr();

  React.useEffect(() => {
    if (member) sessionStorage.setItem('familia_silva_member', JSON.stringify(member));
  }, [member]);

  React.useEffect(() => {
    fetch('./devocionais.json')
      .then(r => r.json())
      .then(data => {
        const found = data.find(d => d.data === today);
        if (found) {
          setDevocional(found);
        } else {
          const dayOfYear = Math.floor(
            (new Date(today) - new Date(new Date().getFullYear() + '-01-01')) / 86400000
          );
          setDevocional(data[dayOfYear % data.length] || data[0]);
        }
      })
      .catch(() => setDevocional({
        titulo: 'Descanse em Deus',
        versiculo: '"Vinde a mim, todos os que estais cansados e sobrecarregados, e eu vos darei descanso." — Mateus 11:28',
        reflexao: 'Em meio à correria do dia a dia, Deus nos convida a encontrar descanso em Sua presença.',
        oracao: 'Senhor, que nossa família encontre paz e força em Ti hoje. Amém.',
      }));
  }, [today]);

  const handleLogout = () => {
    sessionStorage.removeItem('familia_silva_member');
    setMember(null);
  };

  if (!member) {
    return <LoginScreen onSelect={setMember} />;
  }

  return (
    <div className="app-shell">
      <Header member={member} onLogout={handleLogout} />
      <div className="scroll-area">
        {tab === 'devocional' && (
          <DevocionalTab
            devotional={devotional}
            member={member}
            today={today}
          />
        )}
        {tab === 'oracoes'   && <OracoesTab   member={member} />}
        {tab === 'missoes'   && <MissoesTab   member={member} />}
        {tab === 'progresso' && <ProgressoTab member={member} />}
      </div>
      <NavBar active={tab} onChange={setTab} memberColor={member.color} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
